# Nginx — desenvolvimento local (Fase 4)
# NÃO está no docker-compose ainda. Uso: nginx no host apontando para localhost.
#
# Pré-requisitos:
#   1. Backend Piloto: http://localhost:3334 (API_HOST_PORT no .env)
#   2. Futuro Angular cliente: porta 4200 (exemplo)
#   3. Futuro Angular admin: porta 4201 (exemplo)
#   4. Entradas no arquivo hosts (Windows: C:\Windows\System32\drivers\etc\hosts):
#        127.0.0.1 api.localhost
#        127.0.0.1 cliente.localhost
#        127.0.0.1 admin.localhost
#
# Incluir este arquivo no nginx principal, ex.:
#   include C:/caminho/pilotodeapoiov2/infra/nginx/nginx.dev.conf;

upstream piloto_backend {
    # Piloto de Apoio v2 — host (NamMedV2 usa 3333; Piloto usa 3334 neste ambiente)
    server 127.0.0.1:3334;
    keepalive 32;
}

upstream piloto_frontend_cliente {
    # Angular cliente (Fase 5+) — ajustar porta quando o app existir
    server 127.0.0.1:4200;
}

upstream piloto_frontend_admin {
    # Angular admin (Fase 5+) — ajustar porta quando o app existir
    server 127.0.0.1:4201;
}

# --- API ---
server {
    listen 80;
    server_name api.localhost;

    location / {
        proxy_pass http://piloto_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

# --- Frontend cliente ---
server {
    listen 80;
    server_name cliente.localhost;

    location / {
        proxy_pass http://piloto_frontend_cliente;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- Frontend admin ---
server {
    listen 80;
    server_name admin.localhost;

    location / {
        proxy_pass http://piloto_frontend_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

