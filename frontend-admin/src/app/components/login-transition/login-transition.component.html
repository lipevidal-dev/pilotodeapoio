<div class="transition-overlay" role="status" aria-live="polite" aria-label="Carregando sistema">
  <div class="transition-bg" aria-hidden="true">
    <div class="transition-bg__texture"></div>
    <div class="transition-bg__glow transition-bg__glow--left"></div>
    <div class="transition-bg__glow transition-bg__glow--right"></div>
    <div class="transition-bg__grid"></div>
  </div>

  <div class="transition-stage">
    <div class="transition-block transition-block--gol">
      <img
        class="transition-brand-logo"
        src="assets/brand/logo-gol-placeholder.svg"
        alt="Piloto de Apoio"
      />
    </div>

    <div class="transition-block transition-block--separator">
      <div class="transition-separator">
        <span class="transition-separator__line"></span>
        <svg class="transition-separator__plane" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M12 2.5 14.2 9.5 21 10.8 14.2 12.1 12 19.1 9.8 12.1 3 10.8 9.8 9.5Z"
            fill="currentColor"
          />
        </svg>
        <span class="transition-separator__line"></span>
      </div>
    </div>

    <div class="transition-block transition-block--escala">
      <div class="transition-escala-brand">
        <svg
          class="transition-escala-mark"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 56 56"
          aria-hidden="true"
        >
          <circle cx="28" cy="28" r="24" fill="none" stroke="#FF6600" stroke-width="5" />
          <circle cx="28" cy="28" r="18" fill="none" stroke="#FF6600" stroke-width="2" opacity="0.35" />
          <path d="M14 34 L24 30 L38 18 L42 22 L28 34 Z" fill="#333333" />
          <path d="M24 30 L38 18" stroke="#FF6600" stroke-width="2.5" stroke-linecap="round" />
          <circle cx="28" cy="10" r="2" fill="#FF6600" />
        </svg>
        <div class="transition-escala-text">
          <div class="transition-escala-title">
            <span class="transition-escala-title__escala">ESCALA</span>
            <span class="transition-escala-title__pao">PAO</span>
          </div>
          <p class="transition-escala-subtitle">PLANEJAMENTO • APOIO • OPERAÇÃO</p>
        </div>
      </div>
    </div>

    <p class="transition-loading-message">{{ loadingMessage() }}</p>

    <div class="transition-dots" aria-hidden="true">
      <span class="transition-dots__dot"></span>
      <span class="transition-dots__dot"></span>
      <span class="transition-dots__dot"></span>
    </div>
  </div>

  <div class="transition-glow-ring" aria-hidden="true"></div>
</div>
